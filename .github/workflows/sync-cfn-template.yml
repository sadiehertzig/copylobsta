name: Sync CFN Template

on:
  push:
    branches: ["main"]
    paths:
      - "infra/openclaw-runtime.yaml"
      - "scripts/sync-template-s3.sh"
      - ".github/workflows/sync-cfn-template.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync CloudFormation Template to S3
        env:
          COPYLOBSTA_TEMPLATE_S3_BUCKET: copylobsta-templates-373352901751-us-east-1
          COPYLOBSTA_TEMPLATE_S3_KEY: openclaw-runtime.yaml
          COPYLOBSTA_TEMPLATE_S3_REGION: us-east-1
        run: |
          ./scripts/sync-template-s3.sh
