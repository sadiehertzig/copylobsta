<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Voice Trivia</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- SETUP screen: category + difficulty picker -->
    <div id="setup-screen">
      <h1>Voice Trivia</h1>
      <p class="subtitle">Voice trivia with your AI bot</p>

      <div class="picker-section">
        <h2>Category</h2>
        <div id="category-picker" class="pill-grid"></div>
      </div>

      <div class="picker-section">
        <h2>Difficulty</h2>
        <div id="difficulty-picker" class="pill-grid"></div>
      </div>

      <button id="start-btn" class="primary-btn">Start Voice Trivia</button>
    </div>

    <!-- CONNECTING screen -->
    <div id="connecting-screen" hidden>
      <div class="pulse-ring"></div>
      <p>Connecting...</p>
    </div>

    <!-- PLAYING screen -->
    <div id="playing-screen" hidden>
      <div id="streak-display">0</div>
      <div id="streak-label">streak</div>
      <div id="score-display">Score: 0</div>
      <div id="status-text">Listening...</div>
      <div class="audio-bars">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <button id="stop-btn" class="secondary-btn">End Game</button>
    </div>

    <!-- DONE screen -->
    <div id="done-screen" hidden>
      <h1>Game Over!</h1>
      <div id="final-score"></div>
      <button id="restart-btn" class="primary-btn">Play Again</button>
      <button id="close-btn" class="secondary-btn">Close</button>
    </div>

    <!-- ERROR screen -->
    <div id="error-screen" hidden>
      <h2>Oops!</h2>
      <p id="error-msg"></p>
      <button id="retry-btn" class="primary-btn">Try Again</button>
    </div>

  </div>

  <audio id="remote-audio" autoplay></audio>
  <script src="app.js"></script>
</body>
</html>
